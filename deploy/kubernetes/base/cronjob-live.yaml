apiVersion: batch/v1
kind: CronJob
metadata:
  name: risk-pipeline-live
  labels:
    app.kubernetes.io/component: pipeline-runner
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 900
      template:
        metadata:
          labels:
            app.kubernetes.io/component: pipeline-runner
        spec:
          serviceAccountName: risk-pipeline
          restartPolicy: Never
          securityContext:
            fsGroup: 10001
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: pipeline
              image: financial-risk-data-platform:latest
              imagePullPolicy: IfNotPresent
              command:
                - python
                - -m
                - src.orchestration.run_pipeline
              args:
                - --storage-config
                - /app/config/storage.yaml
                - --thresholds
                - /app/config/risk_thresholds.yaml
                - --summary-json
                - /tmp/pipeline-summary.json
              env:
                - name: PYTHONUNBUFFERED
                  value: "1"
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              volumeMounts:
                - name: risk-config
                  mountPath: /app/config
                  readOnly: true
                - name: runtime-data
                  mountPath: /app/data
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: risk-config
              configMap:
                name: risk-config
            - name: runtime-data
              emptyDir: {}
            - name: tmp
              emptyDir: {}
