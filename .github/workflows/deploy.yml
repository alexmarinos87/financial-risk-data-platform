name: deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target GitHub environment and Kubernetes overlay."
        required: true
        type: choice
        options:
          - dev
          - prod
      run_now:
        description: "Create a one-off Job from the CronJob after deploy."
        required: true
        default: false
        type: boolean
      confirm_deploy:
        description: "Type deploy-dev or deploy-prod to confirm cloud deployment."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

env:
  IMAGE_TAG: ${{ github.sha }}-${{ github.run_attempt }}
  NAMESPACE: financial-risk-${{ inputs.environment }}

jobs:
  guardrails:
    name: Validate deploy request
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Check confirmation and environment
        shell: bash
        run: |
          set -euo pipefail

          expected_confirmation="deploy-${{ inputs.environment }}"
          if [[ "${{ inputs.confirm_deploy }}" != "${expected_confirmation}" ]]; then
            echo "confirm_deploy must be '${expected_confirmation}'"
            exit 1
          fi

          if [[ "${{ vars.ALLOW_CLOUD_DEPLOY }}" != "true" ]]; then
            echo "Set ALLOW_CLOUD_DEPLOY=true in the protected GitHub Environment to deploy."
            exit 1
          fi

          if [[ "${{ inputs.environment }}" == "prod" && "${{ github.ref_name }}" != "main" ]]; then
            echo "Production deploys must run from main."
            exit 1
          fi

  build:
    name: Build image
    runs-on: ubuntu-latest
    needs: guardrails
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - id: image
        run: echo "image_uri=${{ vars.ECR_REPOSITORY_URI }}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.image_uri }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Kubernetes workload
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - run: |
          aws eks update-kubeconfig \
            --name "${{ vars.EKS_CLUSTER_NAME }}" \
            --region "${{ vars.AWS_REGION }}"

      - name: Render Kubernetes manifest
        shell: bash
        run: |
          set -euo pipefail

          render_dir="$(mktemp -d)"
          cp -R deploy/kubernetes "${render_dir}/kubernetes"

          image_uri="${{ needs.build.outputs.image_uri }}"
          export IMAGE_NAME="${image_uri%:*}"
          export IMAGE_TAG="${image_uri##*:}"
          export OVERLAY="${{ inputs.environment }}"
          export RENDER_DIR="${render_dir}"

          python3 <<'PY'
          import os
          from pathlib import Path

          path = (
              Path(os.environ["RENDER_DIR"])
              / "kubernetes"
              / "overlays"
              / os.environ["OVERLAY"]
              / "kustomization.yaml"
          )
          lines = path.read_text(encoding="utf-8").splitlines()

          in_target_image = False
          found = False
          updated = []
          for line in lines:
              stripped = line.strip()
              if stripped.startswith("- name:"):
                  in_target_image = stripped == "- name: financial-risk-data-platform"
              if in_target_image and stripped.startswith("newName:"):
                  line = f"    newName: {os.environ['IMAGE_NAME']}"
                  found = True
              elif in_target_image and stripped.startswith("newTag:"):
                  line = f"    newTag: {os.environ['IMAGE_TAG']}"
              updated.append(line)

          if not found:
              raise SystemExit("financial-risk-data-platform image entry was not found")

          path.write_text("\n".join(updated) + "\n", encoding="utf-8")
          PY

          kubectl kustomize "${render_dir}/kubernetes/overlays/${{ inputs.environment }}" \
            > /tmp/risk-pipeline-rendered.yaml

      - name: Validate Kubernetes manifest
        run: kubectl apply --server-side --dry-run=server -f /tmp/risk-pipeline-rendered.yaml

      - name: Show Kubernetes diff
        run: |
          set +e
          kubectl diff -f /tmp/risk-pipeline-rendered.yaml
          status=$?
          if [ "$status" -gt 1 ]; then
            exit "$status"
          fi

      - run: kubectl apply -f /tmp/risk-pipeline-rendered.yaml

      - if: ${{ inputs.run_now }}
        run: |
          kubectl create job "risk-pipeline-live-${GITHUB_RUN_ID}" \
            --from=cronjob/risk-pipeline-live \
            --namespace "${NAMESPACE}"

      - run: kubectl get cronjob risk-pipeline-live --namespace "${NAMESPACE}"
